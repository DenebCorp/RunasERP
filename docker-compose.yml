
networks:
  erp-network:
    driver: bridge

volumes:
  pgadmin_data:
  rabbitmq_data:
  redis_data:
  db_gateway_data:
  db_clientes_data:
  db_produtos_data:
  db_estoque_data:
  db_vendas_data:
  db_financeiro_data:
  db_notificacoes_data:
  db_evolution_data:

services:
  # ============================================
  # INFRAESTRUTURA
  # ============================================
  
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: erp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  # ============================================
  # DATABASES
  # ============================================

  db-gateway:
    image: postgres:15-alpine
    container_name: erp-db-gateway
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
      POSTGRES_DB: gateway
    volumes:
      - db_gateway_data:/var/lib/postgresql/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-clientes:
    image: postgres:15-alpine
    container_name: erp-db-clientes
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
      POSTGRES_DB: clientes
    volumes:
      - db_clientes_data:/var/lib/postgresql/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d clientes"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-produtos:
    image: postgres:15-alpine
    container_name: erp-db-produtos
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
      POSTGRES_DB: produtos
    volumes:
      - db_produtos_data:/var/lib/postgresql/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d produtos"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-estoque:
    image: postgres:15-alpine
    container_name: erp-db-estoque
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
      POSTGRES_DB: estoque
    volumes:
      - db_estoque_data:/var/lib/postgresql/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d estoque"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-vendas:
    image: postgres:15-alpine
    container_name: erp-db-vendas
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
      POSTGRES_DB: vendas
    volumes:
      - db_vendas_data:/var/lib/postgresql/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d vendas"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-financeiro:
    image: postgres:15-alpine
    container_name: erp-db-financeiro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
      POSTGRES_DB: financeiro
    volumes:
      - db_financeiro_data:/var/lib/postgresql/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d financeiro"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-notificacoes:
    image: postgres:15-alpine
    container_name: erp-db-notificacoes
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
      POSTGRES_DB: notificacoes
    volumes:
      - db_notificacoes_data:/var/lib/postgresql/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d notificacoes"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-evolution:
    image: postgres:15-alpine
    container_name: erp-db-evolution
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
      POSTGRES_DB: evolution
    volumes:
      - db_evolution_data:/var/lib/postgresql/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # PGADMIN
  # ============================================

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: erp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@runas.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgpass:ro
    depends_on:
      - db-gateway
      - db-clientes
      - db-produtos
      - db-estoque
      - db-vendas
      - db-financeiro
      - db-notificacoes
    networks:
      - erp-network

  # ============================================
  # EVOLUTION API (WhatsApp)
  # ============================================

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: erp-evolution-api
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://erp:erp@db-evolution:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me}
    ports:
      - "8080:8080"
    depends_on:
      - db-evolution
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # CELERY WORKER (Compartilhado)
  # ============================================
  # NOTA: Desabilitados até celery_app.py ser implementado no serviço de notificações
