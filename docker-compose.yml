  #   container_name: erp-celery-worker
  #   command: celery -A celery_app worker --loglevel=info
  #   environment:
  #     CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672/}
  #     CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  #     REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  #     RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
  #     EVOLUTION_URL: ${EVOLUTION_URL:-http://evolution-api:8080}
  #     EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
  #     EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-runas}
  #     DATABASE_URL: ${DATABASE_URL_NOTIFICACOES}
  #   depends_on:
  #     - rabbitmq
  #     - redis
  #     - evolution-api
  #   networks:
  #     - erp-network
  #   restart: unless-stopped

  # celery-beat:
  #   build:
  #     context: ./services/notificacoes
  #     dockerfile: Dockerfile
  #   container_name: erp-celery-beat
  #   command: celery -A celery_app beat --loglevel=info
  #   environment:
  #     CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672/}
  #     CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  #     REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  #     RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
  #   depends_on:
  #     - rabbitmq
  #     - redis
  #   networks:
  #     - erp-network
  #   restart: unless-stopped

  # ============================================
  # MICROSSERVIÇOS
  # ============================================

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: erp-api-gateway
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL_GATEWAY}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CLIENTES_URL: ${CLIENTES_URL:-http://clientes:8001}
      PRODUTOS_URL: ${PRODUTOS_URL:-http://produtos:8002}
      ESTOQUE_URL: ${ESTOQUE_URL:-http://estoque:8003}
      VENDAS_URL: ${VENDAS_URL:-http://vendas:8004}
      FINANCEIRO_URL: ${FINANCEIRO_URL:-http://financeiro:8005}
      NOTIFICACOES_URL: ${NOTIFICACOES_URL:-http://notificacoes:8006}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@runas.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
    depends_on:
      db-gateway:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  clientes:
    build:
      context: ./services/clientes
      dockerfile: Dockerfile
    container_name: erp-clientes
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL_CLIENTES}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db-clientes:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  produtos:
    build:
      context: ./services/produtos
      dockerfile: Dockerfile
    container_name: erp-produtos
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: ${DATABASE_URL_PRODUTOS}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db-produtos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  estoque:
    build:
      context: ./services/estoque
      dockerfile: Dockerfile
    container_name: erp-estoque
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: ${DATABASE_URL_ESTOQUE}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db-estoque:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  vendas:
    build:
      context: ./services/vendas
      dockerfile: Dockerfile
    container_name: erp-vendas
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: ${DATABASE_URL_VENDAS}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db-vendas:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  financeiro:
    build:
      context: ./services/financeiro
      dockerfile: Dockerfile
    container_name: erp-financeiro
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: ${DATABASE_URL_FINANCEIRO}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db-financeiro:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  notificacoes:
    build:
      context: ./services/notificacoes
      dockerfile: Dockerfile
    container_name: erp-notificacoes
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: ${DATABASE_URL_NOTIFICACOES}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      EVOLUTION_URL: ${EVOLUTION_URL:-http://evolution-api:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-runas}
    depends_on:
      db-notificacoes:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
